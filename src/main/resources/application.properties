spring.application.name=hsf_seafood_store


spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SeafoodStoreDB;trustServerCertificate=true;encrypt=true

spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update

server.port=8080

# File Upload Configuration
upload.path=uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=50MB

server.servlet.context-path=/