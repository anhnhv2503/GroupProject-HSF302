<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Sản Phẩm Yêu Thích')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .wishlist-content})}">
    <div class="wishlist-content">
        <div class="relative h-[400px] overflow-hidden bg-brand-secondary flex items-center">
            <div class="absolute inset-0 opacity-20">
                <img src="https://images.unsplash.com/photo-1551248429-40975aa4de74?q=80&w=2000" class="w-full h-full object-cover">
            </div>
            <div class="max-w-7xl mx-auto px-8 w-full relative z-10">
                <span class="inline-block px-4 py-1.5 bg-brand-primary text-white text-[10px] font-black uppercase tracking-[0.3em] rounded-full mb-6">Personal Collection</span>
                <h1 class="text-6xl lg:text-8xl font-black text-white tracking-tighter uppercase leading-none">Yêu <span class="text-brand-primary italic">Thích</span></h1>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-8 py-24">
            <div th:if="${products == null or products.isEmpty()}" class="text-center py-20 bg-white rounded-[3rem] border border-dashed border-slate-200">
                <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <span class="material-symbols-outlined text-5xl text-slate-200">favorite</span>
                </div>
                <h2 class="text-2xl font-bold uppercase tracking-tight mb-2">Danh sách trống</h2>
                <p class="text-slate-400 mb-8">Bạn chưa lưu sản phẩm nào vào danh sách yêu thích.</p>
                <a th:href="@{/products}" class="inline-flex items-center gap-3 bg-brand-secondary text-white px-10 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:shadow-2xl transition-all">Bắt đầu mua sắm <span class="material-symbols-outlined text-sm">east</span></a>
            </div>

            <div th:unless="${#lists.isEmpty(products)}" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <div th:each="product : ${products}" class="group bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col h-full hover:shadow-2xl transition-all duration-500" th:id="'product-card-' + ${product.id}">
                    <div class="relative aspect-square overflow-hidden">
                        <a th:href="@{/products/{id}(id=${product.id})}">
                            <img th:if="${product.images != null and !product.images.isEmpty()}" th:src="@{${product.images[0].imageUrl}}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" th:alt="${product.name}" />
                            <img th:unless="${product.images != null and !product.images.isEmpty()}" src="https://via.placeholder.com/400x400?text=Premium+Seafood" class="w-full h-full object-cover" />
                        </a>
                        <button type="button" th:onclick="'removeFromWishlist(' + ${product.id} + ')'" class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/90 backdrop-blur shadow-xl flex items-center justify-center text-red-500 shadow-xl hover:bg-red-500 hover:text-white transition-all transform hover:rotate-12">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <div class="mb-4">
                            <h3 class="font-black text-xl tracking-tight uppercase leading-none mb-2">
                                <a th:href="@{/products/{id}(id=${product.id})}" th:text="${product.name}" class="hover:text-brand-primary transition-colors line-clamp-1">Product Name</a>
                            </h3>
                            <div class="flex items-baseline gap-2">
                                <span class="text-2xl font-black text-brand-secondary" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">/ kg</span>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <form th:action="@{/cart/add}" th:onsubmit="'addToCartAjax(event, this)'" method="post">
                                <input type="hidden" name="productId" th:value="${product.id}" />
                                <input type="hidden" name="name" th:value="${product.name}" />
                                <input type="hidden" name="price" th:value="${product.price}" />
                                <input type="hidden" name="imageUrl" th:value="${not #lists.isEmpty(product.images) ? product.images[0].imageUrl : ''}" />
                                <button type="submit" class="w-full h-14 rounded-2xl bg-brand-primary text-white font-black text-xs uppercase tracking-widest flex items-center justify-center gap-3 hover:shadow-xl transition-all shadow-lg active:scale-95">
                                    <span class="material-symbols-outlined">shopping_cart</span>
                                    <span>Vào giỏ hàng</span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            function addToCartAjax(event, form) {
                event.preventDefault();
                const formData = new FormData(form);
                const params = new URLSearchParams(formData);

                fetch(form.action || '/cart/add', {
                    method: 'POST',
                    body: params,
                    headers: { 
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const badge = document.getElementById('cart-badge');
                        if (badge) badge.innerText = data.count;
                        const btn = form.querySelector('button[type="submit"]');
                        const originalContent = btn.innerHTML;
                        btn.innerHTML = '<span class="material-symbols-outlined">done</span> <span>Đã thêm</span>';
                        btn.classList.replace('bg-brand-primary', 'bg-green-600');
                        setTimeout(() => {
                            btn.innerHTML = originalContent;
                            btn.classList.replace('bg-green-600', 'bg-brand-primary');
                        }, 2000);
                    } else if (data.error) {
                        alert(data.error);
                    }
                })
                .catch(error => console.error('Error:', error));
            }

            function removeFromWishlist(productId) {
                // Remove confirm for faster interaction
                fetch('/wishlist/toggle/' + productId, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    // Service returns {added: false, count: X} when removing
                    if (data.added === false) {
                        const card = document.getElementById('product-card-' + productId);
                        if (card) {
                            card.style.opacity = '0';
                            card.style.transform = 'scale(0.9)';
                            card.style.pointerEvents = 'none';
                            setTimeout(() => {
                                card.remove();
                                const remainingCards = document.querySelectorAll('[id^="product-card-"]');
                                if (remainingCards.length === 0) {
                                    window.location.reload();
                                }
                            }, 300);
                        }
                        const badge = document.getElementById('wishlist-badge');
                        if (badge) badge.innerText = data.count;
                    }
                })
                .catch(error => console.error('Error:', error));
            }
        </script>
    </div>
</body>
</html>
