<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Hồ Sơ Cá Nhân')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .profile-page-content})}">
    <div class="profile-page-content">
        <div class="max-w-7xl mx-auto px-8 py-12">
            <div class="mb-12">
                <h1 class="text-4xl font-black text-brand-secondary tracking-tighter uppercase leading-none">Hồ Sơ <br/><span class="text-brand-primary">Cá Nhân</span></h1>
                <p class="text-slate-400 font-medium mt-4">Quản lý thông tin tài khoản và đơn hàng của bạn.</p>
            </div>

            <div th:if="${success}" class="mb-8 p-6 bg-green-50 border border-green-100 rounded-3xl text-green-600 font-bold flex items-center gap-3">
                <span class="material-symbols-outlined">check_circle</span>
                <span th:text="${success}"></span>
            </div>
            
            <div th:if="${error}" class="mb-8 p-6 bg-red-50 border border-red-100 rounded-3xl text-red-600 font-bold flex items-center gap-3">
                <span class="material-symbols-outlined">error</span>
                <span th:text="${error}"></span>
            </div>

            <div class="flex flex-col lg:flex-row gap-12">
                <!-- Sidebar -->
                <aside class="lg:col-span-3 lg:w-80">
                    <div th:replace="~{layout/fragments/profile-sidebar :: sidebar(active='profile')}"></div>
                </aside>
                
                <!-- Content Area -->
                <main class="flex-1 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm p-10">
                    <div th:replace="~{layout/fragments/profile-content :: content}"></div>
                </main>
            </div>
        </div>
    </div>
</body>
</html>
