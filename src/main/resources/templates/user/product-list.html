<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Danh Sách Hải Sản')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .products-content})}">
    <div class="products-content">
        <div class="bg-slate-50 min-h-screen pb-20">
            <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 lg:grid-cols-12 gap-10 pt-10">
                <!-- Sidebar -->
                <aside class="lg:col-span-3 space-y-8 lg:sticky lg:top-36 h-fit">
                    <div class="bg-brand-secondary rounded-[2.5rem] overflow-hidden shadow-2xl p-6">
                        <div class="text-center py-6 mb-4">
                            <h2 class="text-white font-black text-xl tracking-tight uppercase leading-none">Oceanic<br/><span class="text-brand-primary">Menu</span></h2>
                            <div class="h-1 w-10 bg-brand-primary mx-auto mt-4 rounded-full"></div>
                        </div>
                        <nav class="space-y-1">
                            <a th:href="@{/products}" class="flex items-center gap-3 px-6 py-4 rounded-2xl text-white/70 font-bold transition-all hover:bg-white/5" th:classappend="${selectedCategory == null} ? 'bg-brand-primary text-white' : ''">
                                <span class="material-symbols-outlined text-xl">grid_view</span>
                                <span>Tất cả sản phẩm</span>
                            </a>
                            <div class="h-px bg-white/5 my-4 mx-4"></div>
                            <div th:each="cat : ${categories}">
                                <a th:href="@{/products(categoryId=${cat.id})}" class="flex items-center gap-3 px-6 py-4 rounded-2xl text-white/70 font-bold transition-all hover:bg-white/5" th:classappend="${selectedCategory == cat.id} ? 'bg-brand-primary text-white' : ''">
                                    <span class="material-symbols-outlined text-xl">set_meal</span>
                                    <span th:text="${cat.name}">Category</span>
                                </a>
                            </div>
                        </nav>
                    </div>
                </aside>

                <!-- Product Grid -->
                <main class="lg:col-span-9">
                    <!-- Filters/Header -->
                    <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
                        <div>
                            <h1 class="text-4xl font-black text-brand-secondary uppercase tracking-tighter">Thực Đơn Oceanic</h1>
                            <p class="text-slate-400 font-medium mt-2"><span th:text="${#lists.size(products)}">0</span> tinh hoa đại dương đang sẵn sàng.</p>
                        </div>
                        <div class="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 pl-4">Sắp xếp:</span>
                            <select onchange="window.location.href = this.value" class="bg-transparent border-0 font-bold text-xs uppercase tracking-widest text-brand-secondary outline-none cursor-pointer focus:ring-0">
                                <option th:value="@{/products(sortBy='id', sortDir='desc')}" th:selected="${sortBy == 'id'}">Mới nhất</option>
                                <option th:value="@{/products(sortBy='price', sortDir='asc')}" th:selected="${sortBy == 'price' and sortDir == 'asc'}">Giá tăng dần</option>
                                <option th:value="@{/products(sortBy='price', sortDir='desc')}" th:selected="${sortBy == 'price' and sortDir == 'desc'}">Giá giảm dần</option>
                            </select>
                        </div>
                    </div>

                    <!-- Grid -->
                    <div th:if="${#lists.isEmpty(products)}" class="py-32 text-center bg-white rounded-[3rem] border border-dashed border-slate-200">
                        <span class="material-symbols-outlined text-5xl text-slate-200 mb-6">inventory_2</span>
                        <h2 class="text-xl font-bold uppercase">Không tìm thấy sản phẩm</h2>
                        <a th:href="@{/products}" class="mt-8 inline-block text-brand-primary font-bold uppercase tracking-widest text-xs">Xem tất cả</a>
                    </div>

                    <div th:unless="${#lists.isEmpty(products)}" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-10">
                        <div th:each="product : ${products}" class="group bg-white rounded-[2.5rem] overflow-hidden flex flex-col transition-all duration-500 border border-slate-100 hover:shadow-2xl">
                            <div class="relative aspect-[4/5] overflow-hidden bg-slate-50">
                                <a th:href="@{'/products/' + ${product.id}}">
                                    <img th:if="${product.images != null and !product.images.isEmpty()}" th:src="@{${product.images[0].imageUrl}}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                                    <img th:unless="${product.images != null and !product.images.isEmpty()}" src="https://via.placeholder.com/400x500?text=Seafood" class="w-full h-full object-cover" />
                                </a>
                                <!-- Wishlist Heart -->
                                <button type="button" 
                                        th:onclick="'toggleWishlistAjax(event, this, ' + ${product.id} + ')'"
                                        class="absolute top-6 right-6 z-30 w-12 h-12 rounded-2xl bg-white/80 backdrop-blur-md flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-white transition-all shadow-lg group/heart opacity-0 translate-y-4 group-hover:opacity-100 group-hover:translate-y-0 duration-500">
                                    <span class="material-symbols-outlined text-2xl group-hover/heart:fill-1">heart_plus</span>
                                </button>
                            </div>
                            <div class="p-8 flex flex-col flex-grow">
                                <h3 class="text-xl font-black text-brand-secondary tracking-tight uppercase line-clamp-2 mb-3 h-14">
                                    <a th:href="@{'/products/' + ${product.id}}" th:text="${product.name}" class="hover:text-brand-primary transition-colors">Product Name</a>
                                </h3>
                                <div class="flex items-baseline gap-2 mb-2">
                                    <span class="text-2xl font-black text-brand-secondary" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">/ kg</span>
                                </div>
                                <!-- Rating Stars -->
                                <div class="flex items-center gap-2 mb-6" th:with="avgRating=${#lists.isEmpty(product.reviews) ? 5 : #aggregates.avg(product.reviews.![rating])}">
                                    <div class="flex text-amber-400">
                                        <span th:each="i : ${#numbers.sequence(1, 5)}" 
                                              class="material-symbols-outlined text-sm"
                                              th:classappend="${!#lists.isEmpty(product.reviews) ? (i <= avgRating ? 'fill-1' : '') : 'fill-1'}">star</span>
                                    </div>
                                    <span class="text-[9px] font-bold text-slate-300 uppercase tracking-widest" th:text="${#lists.size(product.reviews)} + ' đánh giá'">0 đánh giá</span>
                                </div>
                                <div class="mt-auto pt-6 border-t border-slate-50 flex items-center justify-between">
                                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Đã bán: <span th:text="${product.soldCount ?: 0}">0</span></span>
                                    <form th:action="@{/cart/add}" th:onsubmit="'addToCartAjax(event, this)'" method="post">
                                        <input type="hidden" name="productId" th:value="${product.id}" />
                                        <input type="hidden" name="name" th:value="${product.name}" />
                                        <input type="hidden" name="price" th:value="${product.price}" />
                                        <input type="hidden" name="imageUrl" th:value="${not #lists.isEmpty(product.images) ? product.images[0].imageUrl : ''}" />
                                        <button type="submit" class="w-12 h-12 bg-brand-primary text-white rounded-2xl flex items-center justify-center shadow-lg hover:shadow-orange-500/30 transition-all active:scale-95">
                                            <span class="material-symbols-outlined">add_shopping_cart</span>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>

        <!-- Inline Scripts for Interaction -->
        <script th:inline="javascript">
            function addToCartAjax(event, form) {
                event.preventDefault();
                const formData = new FormData(form);
                const params = new URLSearchParams(formData);

                fetch(form.action || '/cart/add', {
                    method: 'POST',
                    body: params,
                    headers: { 
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const badge = document.getElementById('cart-badge');
                        if (badge) badge.innerText = data.count;
                        const btn = form.querySelector('button[type="submit"]');
                        const originalContent = btn.innerHTML;
                        btn.innerHTML = '<span class="material-symbols-outlined">done</span>';
                        btn.classList.replace('bg-brand-primary', 'bg-green-600');
                        setTimeout(() => {
                            btn.innerHTML = originalContent;
                            btn.classList.replace('bg-green-600', 'bg-brand-primary');
                        }, 2000);
                    } else if (data.error) {
                        alert(data.error);
                    }
                })
                .catch(error => console.error('Error:', error));
            }

            function toggleWishlistAjax(event, btn, productId) {
                event.preventDefault();
                event.stopPropagation();
                fetch('/wishlist/toggle/' + productId, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    const icon = btn.querySelector('.material-symbols-outlined');
                    const badge = document.getElementById('wishlist-badge');
                    
                    if (data.status === 'added') {
                        icon.classList.add('fill-1');
                        icon.classList.replace('text-slate-400', 'text-red-500');
                    } else {
                        icon.classList.remove('fill-1');
                        icon.classList.replace('text-red-500', 'text-slate-400');
                    }
                    if (badge && data.count !== undefined) badge.innerText = data.count;
                })
                .catch(error => console.error('Error:', error));
            }
        </script>
    </div>
</body>
</html>
