<!-- ═══════════════════════════════════════════════════════════════════
     COMPONENT: Product Card
     Usage: th:replace="~{fragments/components/product-card :: card(product, canAddToCart)}"
     Color Token: #D35400 (brand-primary)
     ═══════════════════════════════════════════════════════════════════ -->
<div th:fragment="card(product, canAddToCart)"
     class="group relative overflow-hidden rounded-xl bg-surface-container-low shadow-sm flex flex-col hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
     xmlns:th="http://www.thymeleaf.org">

    <a th:href="@{'/products/' + ${product.id}}" class="relative aspect-square overflow-hidden block"
       th:aria-label="${'Xem chi tiết ' + product.name}">
        <!-- Badge -->
        <div class="absolute top-3 left-3 z-10 flex flex-col gap-1.5">
            <div th:if="${product.stockQuantity != null and product.stockQuantity <= 0}"
                 class="bg-black/80 backdrop-blur text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow-lg">Hết hàng</div>
            <div th:if="${product.freshnessStatus == 'FRESH'}"
                 class="bg-green-600 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow">Daily</div>
            <div th:if="${product.freshnessStatus == 'FROZEN'}"
                 class="bg-blue-600 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow">Frozen</div>
            <div th:if="${product.freshnessStatus == 'LIVE'}"
                 class="bg-orange-600 text-white text-[9px] font-black px-2.5 py-1 rounded-full uppercase tracking-wider shadow">Live</div>
        </div>

        <!-- Wishlist Heart Button -->
        <button type="button" 
                th:onclick="'toggleWishlistAjax(event, this, ' + ${product.id} + ')'"
                class="absolute top-3 right-3 z-30 w-10 h-10 rounded-full bg-white/80 backdrop-blur-md flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-white transition-all shadow-sm group/heart">
            <span class="material-symbols-outlined text-xl group-hover/heart:fill-1">heart_plus</span>
        </button>

        <!-- Image -->
        <img th:if="${product.images != null and !product.images.isEmpty()}"
             th:with="primaryImg=${product.images.^[isPrimary != null and isPrimary]}"
             th:src="@{${primaryImg != null ? primaryImg.imageUrl : product.images[0].imageUrl}}"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
             th:classappend="${product.stockQuantity != null and product.stockQuantity <= 0} ? 'grayscale opacity-60' : ''"
             th:alt="${product.name}"/>
        <img th:unless="${product.images != null and !product.images.isEmpty()}"
             src="https://via.placeholder.com/400x400?text=Seafood"
             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
             th:classappend="${product.stockQuantity != null and product.stockQuantity <= 0} ? 'grayscale opacity-60' : ''"
             alt="Seafood"/>

        <!-- Out of Stock Overlay -->
        <div th:if="${product.stockQuantity != null and product.stockQuantity <= 0}"
             class="absolute inset-0 z-20 bg-black/20 backdrop-blur-[2px] flex items-center justify-center">
            <div class="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-3 rounded-2xl shadow-2xl transform -rotate-12">
                <span class="text-white font-black text-xl uppercase tracking-[0.2em] drop-shadow-lg">Hết hàng</span>
            </div>
        </div>
    </a>

    <div class="p-6 flex flex-col flex-grow">
        <a th:href="@{'/products/' + ${product.id}}" class="block">
            <h3 class="text-lg font-bold mb-2 tracking-tight text-on-surface hover:text-[#D35400] transition-colors line-clamp-2"
                th:text="${product.name}">Tên sản phẩm</h3>
        </a>
        <div class="mt-auto">
            <p class="text-[#D35400] font-black text-lg"
               th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</p>
            
            <!-- Rating & Sold Count -->
            <div class="flex flex-col gap-2 mt-2" th:with="avgRating=${#lists.isEmpty(product.reviews) ? 5 : #aggregates.avg(product.reviews.![rating])}">
                <div class="flex items-center gap-2">
                    <div class="flex text-amber-400">
                        <span th:each="i : ${#numbers.sequence(1, 5)}" 
                              class="material-symbols-outlined text-[14px]"
                              th:classappend="${!#lists.isEmpty(product.reviews) ? (i <= avgRating ? 'fill-1' : '') : 'fill-1'}">star</span>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" th:text="${#lists.size(product.reviews)} + ' Đánh giá'">0 Đánh giá</span>
                </div>
                <div class="flex items-center gap-2 text-slate-500">
                    <span class="material-symbols-outlined text-sm">local_mall</span>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Đã bán <span th:text="${product.soldCount ?: 0}">0</span></span>
                </div>
            </div>
            
            <form th:action="@{/cart/add}" th:onsubmit="'addToCartAjax(event, this)'" method="post" class="mt-4">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <input type="hidden" name="name" th:value="${product.name}"/>
                <input type="hidden" name="price" th:value="${product.price}"/>
                <input type="hidden" name="imageUrl"
                       th:value="${not #lists.isEmpty(product.images) ? product.images[0].imageUrl : '/images/no-image.jpg'}" />
                <input type="hidden" name="quantity" value="1"/>
                <button type="submit"
                        th:disabled="${!(product.stockQuantity > 0) or (canAddToCart != null and !canAddToCart)}"
                        th:title="${canAddToCart != null and !canAddToCart} ? 'Quyền mua hàng của bạn đã bị thu hồi. Liên hệ admin.' : ''"
                        aria-label="Thêm sản phẩm vào giỏ hàng"
                        class="w-full bg-surface-container-highest text-secondary py-2.5 rounded font-bold hover:bg-[#D35400] hover:text-white transition-all uppercase tracking-wide disabled:opacity-50 disabled:grayscale disabled:cursor-not-allowed">
                    <span th:if="${product.stockQuantity > 0 and (canAddToCart == null or canAddToCart)}" class="text-sm">Thêm vào giỏ</span>
                    <span th:if="${product.stockQuantity > 0 and (canAddToCart != null and !canAddToCart)}" class="text-xs">Quyền mua hàng của bạn đã bị thu hồi. LH admin.</span>
                    <span th:if="${product.stockQuantity <= 0}" class="text-sm">Hết hàng</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts for Interaction -->
    <script th:inline="javascript">
        if (typeof addToCartAjax === 'undefined') {
            function addToCartAjax(event, form) {
                event.preventDefault();
                const formData = new FormData(form);
                const params = new URLSearchParams(formData);
                
                fetch(form.action || '/cart/add', {
                    method: 'POST',
                    body: params,
                    headers: { 
                        'X-Requested-With': 'XMLHttpRequest',
                        'Content-Type': 'application/x-www-form-urlencoded'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const badge = document.getElementById('cart-badge');
                        if (badge) badge.innerText = data.count;
                        // Optional: show a mini toast or feedback
                        const btn = form.querySelector('button[type="submit"]');
                        const originalText = btn.innerHTML;
                        btn.innerHTML = '<span class="material-symbols-outlined text-sm">done</span> Đã thêm';
                        btn.classList.add('bg-green-600', 'text-white');
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                            btn.classList.remove('bg-green-600', 'text-white');
                        }, 2000);
                    } else if (data.error) {
                        alert(data.error);
                    }
                })
                .catch(error => console.error('Error:', error));
            }
        }

        if (typeof toggleWishlistAjax === 'undefined') {
            function toggleWishlistAjax(event, btn, productId) {
                event.preventDefault();
                event.stopPropagation();
                fetch('/wishlist/toggle/' + productId, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                })
                .then(response => response.json())
                .then(data => {
                    const icon = btn.querySelector('.material-symbols-outlined');
                    const badge = document.getElementById('wishlist-badge');
                    
                    if (data.status === 'added') {
                        icon.classList.add('fill-1');
                        icon.classList.replace('text-slate-400', 'text-red-500');
                    } else {
                        icon.classList.remove('fill-1');
                        icon.classList.replace('text-red-500', 'text-slate-400');
                    }
                    if (badge && data.count !== undefined) badge.innerText = data.count;
                })
                .catch(error => console.error('Error:', error));
            }
        }
    </script>
</div>
