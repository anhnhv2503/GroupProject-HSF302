<!-- ═══════════════════════════════════════════════════════════════════
     DESIGN TOKENS — Single Source of Truth
     Fragment: th:fragment="head"
     Color Primary: #D35400  |  Font Headline: Playfair Display
     ═══════════════════════════════════════════════════════════════════ -->
<th:block th:fragment="head" xmlns:th="http://www.thymeleaf.org">

    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <!-- ── Tailwind CSS CDN ── -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- ── Google Fonts ── -->
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Inter:wght@300;400;500;600;700;800;900&amp;family=Roboto:wght@400;500;700&amp;display=swap"
        rel="stylesheet" />

    <!-- ── Material Symbols ── -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- ── Bootstrap Icons ── -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <!-- ── Tailwind Design Tokens ── -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "brand-primary": "#D35400",
                        "brand-secondary": "#0D4A7A",
                        "brand-bg": "#F8F9FA",
                        "surface-container-highest": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#004b6f",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#9dcaff",
                        "inverse-surface": "#2e3132",
                        "error": "#ba1a1a",
                        "surface-dim": "#d9dadb",
                        "surface": "#f8f9fa",
                        "on-primary-fixed-variant": "#7f2b00",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#8cceff",
                        "surface-container": "#edeeef",
                        "tertiary": "#006492",
                        "on-primary-fixed": "#370e00",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-tint": "#a63b00",
                        "on-surface": "#191c1d",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#009ade",
                        "surface-container-high": "#e7e8e9",
                        "secondary": "#2e6192",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "on-surface-variant": "#594138",
                        "on-primary": "#ffffff",
                        "secondary-container": "#98c7ff",
                        "primary-fixed": "#ffdbce",
                        "on-secondary-container": "#1c5384",
                        "on-secondary-fixed": "#001d35",
                        "outline-variant": "#e1bfb3",
                        "outline": "#8d7166",
                        "on-primary-container": "#4f1800",
                        "primary": "#a63b00",
                        "on-tertiary-fixed": "#001e2f",
                        "tertiary-fixed": "#cae6ff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb599",
                        "on-tertiary-container": "#002d45",
                        "on-secondary-fixed-variant": "#0b4979",
                        "surface-container-low": "#f3f4f5",
                        "primary-fixed-dim": "#ffb599",
                        "surface-bright": "#f8f9fa",
                        "secondary-fixed": "#d1e4ff",
                        "on-background": "#191c1d",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#f26522",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Playfair Display", "serif"],
                        "body": ["Be Vietnam Pro", "Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>

    <!-- ── Global Styles ── -->
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Be Vietnam Pro', 'Inter', sans-serif;
        }

        .font-roboto {
            font-family: 'Roboto', sans-serif;
        }

        .font-headline {
            font-family: 'Playfair Display', serif;
        }

        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Focus styles — Accessibility */
        button:focus,
        a:focus {
            outline: 2px solid #D35400;
            outline-offset: 2px;
        }

        .premium-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background-color: #009ade;
            color: white;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 20;
            border: 2px solid rgba(255, 255, 255, 0.3);
            text-align: center;
            line-height: 1;
        }
    </style>

</th:block>
