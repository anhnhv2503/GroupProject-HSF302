<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Giỏ Hàng')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .cart-content})}">
    <div class="cart-content">
        <div class="max-w-6xl mx-auto px-6 py-12">
            <h1 class="text-3xl font-black text-brand-secondary uppercase tracking-tighter">Giỏ Hàng Của Bạn</h1>
            <div class="h-px bg-slate-200 my-6"></div>
            
            <div th:if="${#lists.isEmpty(cartItems)}" class="text-center py-16">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-4xl text-slate-300">shopping_bag</span>
                </div>
                <h3 class="text-xl font-bold">Giỏ hàng đang trống</h3>
                <p class="text-slate-500 mt-2">Hãy tiếp tục khám phá các đặc sản đại dương.</p>
                <a href="/products" class="mt-8 inline-block bg-brand-primary text-white px-8 py-4 rounded-full font-bold uppercase tracking-widest text-xs transition-all hover:shadow-lg">Mua sắm ngay</a>
            </div>

            <div th:unless="${#lists.isEmpty(cartItems)}" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-4">
                    <div th:each="item : ${cartItems}" class="flex flex-col md:flex-row gap-6 rounded-2xl border border-slate-100 p-6 bg-white shadow-sm transition-all hover:shadow-md">
                        <div class="h-32 w-32 flex-shrink-0 overflow-hidden rounded-xl bg-slate-50">
                            <img th:src="${item.imageUrl}" class="h-full w-full object-cover" />
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-lg font-bold text-slate-900" th:text="${item.name}">Tên sản phẩm</h3>
                                    <p class="text-brand-primary font-bold mt-1" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>
                                </div>
                                <form th:action="@{/cart/remove}" method="post">
                                    <input type="hidden" name="itemKey" th:value="${item.itemKey}" />
                                    <button type="submit" class="text-slate-300 hover:text-red-500 transition-colors">
                                        <span class="material-symbols-outlined">delete</span>
                                    </button>
                                </form>
                            </div>
                             <div class="flex justify-between items-end mt-4">
                                <div class="flex items-center bg-white border border-slate-200 rounded-xl overflow-hidden">
                                    <form th:action="@{/cart/update}" method="post" class="flex items-center">
                                        <input type="hidden" name="itemKey" th:value="${item.itemKey}" />
                                        <button type="button" 
                                                th:onclick="'updateCartQuantity(this, -1)'"
                                                class="w-10 h-10 flex items-center justify-center hover:bg-slate-50 transition-colors">
                                            <span class="material-symbols-outlined text-sm">remove</span>
                                        </button>
                                        <input type="number" name="quantity" th:value="${item.quantity}" 
                                               class="w-12 text-center border-none focus:ring-0 font-bold text-sm bg-transparent" readonly />
                                        <button type="button" 
                                                th:onclick="'updateCartQuantity(this, 1)'"
                                                class="w-10 h-10 flex items-center justify-center hover:bg-slate-50 transition-colors">
                                            <span class="material-symbols-outlined text-sm">add</span>
                                        </button>
                                    </form>
                                </div>
                                <div class="text-right">
                                    <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-1">Thành tiền</p>
                                    <p class="text-xl font-black text-brand-secondary" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-4">
                    <div class="p-8 border border-slate-100 rounded-3xl bg-white sticky top-40 shadow-sm">
                        <h4 class="text-sm font-bold uppercase tracking-[0.2em] text-slate-400 mb-6">Tóm tắt đơn hàng</h4>
                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between text-slate-600">
                                <span>Tạm tính</span>
                                <span class="font-bold" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                            <div class="flex justify-between text-slate-600">
                                <span>Phí vận chuyển</span>
                                <span class="italic text-xs">Tính khi thanh toán</span>
                            </div>
                        </div>
                        <div class="h-px bg-slate-100 mb-6"></div>
                        <div class="flex justify-between items-end mb-8">
                            <span class="font-bold text-slate-900">Tổng cộng</span>
                            <span class="text-3xl font-black text-brand-primary" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <a href="/checkout" class="block w-full text-center bg-brand-secondary text-white py-5 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-slate-800 transition-all shadow-xl shadow-brand-secondary/10">Tiến hành thanh toán</a>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function updateCartQuantity(btn, delta) {
                const form = btn.closest('form');
                const input = form.querySelector('input[name="quantity"]');
                let newVal = parseInt(input.value) + delta;
                if (newVal < 1) newVal = 1;
                input.value = newVal;
                form.submit();
            }
        </script>
    </div>
</body>
</html>
