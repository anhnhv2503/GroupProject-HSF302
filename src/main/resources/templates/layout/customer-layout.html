<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - The Culinary Curator">The Culinary Curator</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>

    <!-- Bootstrap 5 CSS -->
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!-- Custom CSS -->
    <link th:href="@{/css/custom.css}" rel="stylesheet"/>
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg customer-navbar sticky-top">
        <div class="container">
            <!-- Brand -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-tsunami fs-4 text-primary"></i>
                <span class="fw-bold">The Culinary Curator</span>
            </a>

            <!-- Toggler -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#customerNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="customerNav">
                <!-- Search -->
                <form action="/products" method="get" class="d-flex mx-auto" style="max-width:480px;width:100%;">
                    <div class="input-group">
                        <input type="text" name="q" class="form-control rounded-start-pill border-end-0" placeholder="Tìm kiếm hải sản cao cấp..."/>
                        <button class="btn btn-outline-secondary rounded-end-pill border-start-0" type="submit">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <!-- Right Nav -->
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <!-- Wishlist -->
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="/wishlist">
                            <i class="bi bi-heart fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary"
                                  style="font-size:.6rem;" th:text="${session.wishlistCount ?: 0}">0</span>
                        </a>
                    </li>
                    <!-- Cart -->
                    <li class="nav-item">
                        <a class="nav-link position-relative" href="/cart">
                            <i class="bi bi-cart3 fs-5"></i>
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary"
                                  style="font-size:.6rem;" th:text="${session.cartCount ?: 0}">0</span>
                        </a>
                    </li>
                    <!-- Not authenticated -->
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a href="/login" class="btn btn-outline-secondary btn-sm me-1">Đăng nhập</a>
                        <a href="/register" class="btn btn-primary btn-sm">Đăng ký</a>
                    </li>
                    <!-- Authenticated -->
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle fs-5"></i>
                            <span sec:authentication="principal.username" class="small fw-semibold">Username</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                            <li class="dropdown-header small">
                                Đã đăng nhập với <br/>
                                <strong sec:authentication="principal.username"></strong>
                            </li>
                            <li><hr class="dropdown-divider"/></li>
                            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>Admin Panel</a></li>
                            <li><a class="dropdown-item" href="/orders/my"><i class="bi bi-bag me-2"></i>Đơn hàng của tôi</a></li>
                            <li><a class="dropdown-item" href="/profile"><i class="bi bi-person me-2"></i>Hồ sơ cá nhân</a></li>
                            <li><hr class="dropdown-divider"/></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i>Đăng xuất</button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1">
        <div layout:fragment="content">
            <!-- child content -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-brand-secondary text-white py-4 mt-5" style="border-top:4px solid var(--brand-primary);">
        <div class="container text-center">
            <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
                <i class="bi bi-tsunami text-primary fs-5"></i>
                <span class="fw-bold fs-5">The Culinary Curator</span>
            </div>
            <p class="text-white-50 small mb-0">&copy; 2026 The Culinary Curator. All rights reserved.</p>
        </div>
    </footer>

    <!-- Chatbot Widget -->
    <div th:replace="chatbot/chatbot :: widget"></div>

    <!-- Bootstrap JS -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
