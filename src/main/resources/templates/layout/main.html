<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' | The Culinary Curator'"></title>

    <!-- Essential Assets -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "brand-primary": "#D35400",
                        "brand-secondary": "#0D4A7A",
                        "primary": "#F26522",
                        "secondary": "#2e6192"
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Be Vietnam Pro', sans-serif; }
    </style>
</head>
<body th:fragment="layout(content)">
    <header th:replace="~{fragments/layout/header :: header}"></header>

    <main class="pt-32 min-h-screen">
        <div th:replace="${content}"></div>
    </main>

    <footer th:replace="~{fragments/layout/footer :: footer}"></footer >
    
    <!-- Shared Scripts -->
</body>
</html>
