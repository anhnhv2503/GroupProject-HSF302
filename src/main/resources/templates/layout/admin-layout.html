<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">The Culinary Curator - Admin</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>

    <!-- Bootstrap 5 CSS -->
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <!-- Custom CSS -->
    <link th:href="@{/css/custom.css}" rel="stylesheet"/>
</head>
<body>

    <div class="d-flex">
        <!-- Sidebar Fragment -->
        <div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

        <!-- Main Content -->
        <div class="admin-content w-100">
            <!-- Header Fragment -->
            <div th:replace="~{admin/fragments/header :: header}"></div>

            <!-- Page Content -->
            <div class="p-4">
                <div layout:fragment="content">
                    <!-- child content injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
