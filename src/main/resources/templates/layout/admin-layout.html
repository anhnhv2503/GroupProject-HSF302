<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">Admin Panel</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#F26522',
                    }
                }
            }
        }
    </script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-gray-800">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-800 text-white flex flex-col hidden lg:flex h-full border-r border-slate-700">
        <!-- Logo -->
        <div class="h-16 flex items-center px-6 bg-slate-900 border-b border-slate-700 w-full mb-4">
            <a href="/admin/dashboard" class="flex items-center gap-2 text-primary font-bold text-xl tracking-tight">
                <span class="material-symbols-outlined">restaurant</span>
                Admin Panel
            </a>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <a href="/admin/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">dashboard</span> Dashboard
            </a>
            <a href="/admin/products" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">inventory_2</span> Sản phẩm
            </a>
            <a href="/admin/categories" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">category</span> Danh mục
            </a>
            <a href="/admin/combos" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">bento</span> Combo
            </a>
            <a href="/admin/orders" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">shopping_cart</span> Đơn hàng
            </a>
            <a href="/admin/payments" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">payments</span> Thanh toán
            </a>
            <a href="/admin/coupons" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">loyalty</span> Coupon
            </a>
            <a href="/admin/users" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-slate-700 hover:text-white transition-colors text-gray-300">
                <span class="material-symbols-outlined">group</span> Người dùng
            </a>
        </nav>

        <!-- Bottom User Section -->
        <div class="p-4 border-t border-slate-700 bg-slate-900 flex items-center justify-between">
            <div class="flex items-center gap-3 truncate">
                <span class="material-symbols-outlined text-gray-400">shield_person</span>
                <span class="text-sm font-medium truncate" sec:authentication="principal.username">Admin</span>
            </div>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-gray-400 hover:text-red-400 transition-colors p-1" title="Đăng xuất">
                    <span class="material-symbols-outlined">logout</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <!-- Header / Breadcrumb Placeholder -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-8 border-b border-gray-200">
            <div layout:fragment="breadcrumb" class="text-lg font-medium text-gray-700">
                Dashboard
            </div>
            
            <a href="/" class="text-sm font-medium text-primary hover:text-orange-600 flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">open_in_new</span> Xem Website
            </a>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-8">
            <div layout:fragment="content">
                <!-- Content will be injected here -->
            </div>
        </main>
    </div>

</body>
</html>
