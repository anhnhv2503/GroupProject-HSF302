<div class="flex-1" th:fragment="content">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
        <form th:action="@{/profile/update}" th:object="${user}" method="post">
            <div class="mb-8 pb-6 border-b border-slate-200">
                <h3 class="font-bold text-lg text-slate-900">Thông tin hồ sơ</h3>
                <p class="text-sm text-slate-500">Cập nhật thông tin cá nhân của bạn</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Họ và tên</label>
                    <input type="text" th:field="*{fullName}"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập họ và tên" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
                    <input type="email" th:field="*{email}"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập email" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Số điện thoại</label>
                    <input type="text" th:field="*{phone}"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập số điện thoại" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Tên đăng nhập</label>
                    <input type="text" th:field="*{username}"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập tên đăng nhập" />
                </div>
            </div>

            <div class="flex justify-end mt-8 pt-6 border-t border-slate-200">
                <button type="submit" class="bg-[#D35400] text-white px-8 py-3 rounded-xl font-bold text-sm hover:bg-[#b34700] transition-all">
                    Lưu thay đổi
                </button>
            </div>
        </form>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
        <form th:action="@{/profile/change-password}" method="post">
            <div class="mb-8 pb-6 border-b border-slate-200">
                <h3 class="font-bold text-lg text-slate-900">Đổi mật khẩu</h3>
                <p class="text-sm text-slate-500">Thay đổi mật khẩu để bảo mật tài khoản</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Mật khẩu hiện tại</label>
                    <input type="password" name="currentPassword"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập mật khẩu hiện tại" required />
                </div>
                <div></div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Mật khẩu mới</label>
                    <input type="password" name="newPassword"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Nhập mật khẩu mới" required minlength="6" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Xác nhận mật khẩu mới</label>
                    <input type="password" name="confirmPassword"
                        class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-slate-50 focus:border-[#D35400] focus:ring-1 focus:ring-[#D35400] outline-none transition-colors"
                        placeholder="Xác nhận mật khẩu mới" required minlength="6" />
                </div>
            </div>

            <div class="flex justify-end mt-8 pt-6 border-t border-slate-200">
                <button type="submit" class="bg-[#2e6192] text-white px-8 py-3 rounded-xl font-bold text-sm hover:opacity-90 transition-all">
                    Đổi mật khẩu
                </button>
            </div>
        </form>
    </div>
</div>
