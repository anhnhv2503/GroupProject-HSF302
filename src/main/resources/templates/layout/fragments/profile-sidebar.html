<div class="w-full lg:w-64 flex-shrink-0" th:fragment="sidebar(active)">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 text-center border-b border-slate-200">
            <h3 class="font-bold text-slate-900" th:text="${user?.fullName ?: 'Khách hàng'}">Khách hàng</h3>
            <p class="text-xs text-slate-500 mt-1" th:text="${user?.email}">email@example.com</p>
        </div>
        <nav class="p-2">
            <a href="/profile" th:class="${active == 'profile'} ? 'flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#D35400] bg-orange-50' : 'flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors'">
                <span class="material-symbols-outlined text-sm">person</span>
                Thông tin cá nhân
            </a>
            <a href="/profile/address" th:class="${active == 'address'} ? 'flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#D35400] bg-orange-50' : 'flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors'">
                <span class="material-symbols-outlined text-sm">location_on</span>
                Địa chỉ
            </a>
        </nav>
    </div>
</div>
