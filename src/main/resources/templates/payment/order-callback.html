<!DOCTYPE html>
<html lang="vi"  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn hàng đang được chuẩn bị</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<div class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-lg w-full max-w-md text-center">

        <!-- Icon Gói hàng (Box/Package) -->
        <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
            </svg>
        </div>

        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Đang chuẩn bị hàng</h2>
        <p class="text-gray-500 mb-8">Đơn hàng của bạn đã được xác nhận. Người bán đang đóng gói và sẽ sớm giao cho đơn vị vận chuyển.</p>

        <!-- Thông tin đơn hàng -->
        <div class="bg-gray-50 rounded-xl p-5 mb-8 text-left border border-gray-100">
            <div class="flex justify-between mb-3">
                <span class="text-gray-500 text-sm font-medium">Mã đơn hàng</span>
                <span class="text-gray-900 font-semibold text-sm" th:text="${order.orderCode}">#ORD-9876543</span>
            </div>
            <div class="flex justify-between mb-3">
                <span class="text-gray-500 text-sm font-medium">Ngày đặt</span>
                <span class="text-gray-900 font-semibold text-sm" th:text="${order.createdDate}">21 Tháng 04, 2026</span>
            </div>
            <div class="flex justify-between mb-3">
                <span class="text-gray-700 font-bold text-base">Số Tiền</span>
                <span class="text-green-600 font-bold text-base" th:text="${order.finalPrice}">$129.00</span>
            </div>
            <div class="w-full h-px bg-gray-200 my-3"></div>
        </div>

        <!-- Các nút hành động -->
        <div class="flex flex-col space-y-3">
            <a th:href="@{/}" class="w-full bg-white hover:bg-gray-50 text-gray-700 border border-gray-200 font-semibold py-3 px-6 rounded-xl transition duration-200">
                Quay lại trang chủ
            </a>
        </div>

    </div>
</div>

</body>
</html>
