<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Đăng Ký | The Culinary Curator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/custom.css}" rel="stylesheet"/>
</head>
<body>
<main class="d-flex min-vh-100">

    <!-- Left: Cinematic Visual (60%) -->
    <section class="d-none d-md-flex position-fixed w-60 vh-100 overflow-hidden align-items-center justify-content-center p-5" style="width:60%;">
        <div class="position-absolute top-0 start-0 w-100 h-100">
            <img alt="Hải sản tươi sống cao cấp" class="w-100 h-100" style="object-fit:cover;"
                 src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR4aQdZKJvyF1y093CftYXJZ1_-KJXmuZlhyiMyxKH5CeOg9BgQvhUFapqQEQw0QQtT7JdJcEpajSTsd6X-QUaSeaMYDvuhhlhfrmT-C9K5PhnQUqCkFAXZardUs3UHuFjUwjh4CXk5Uf4wWu_l8CXwx0QXGSVAzKCVmYAX2jCdja3Pw_psl6Et_E7qHVhNr5oY8iIa1RkX3dkTBTHsyhvBsT2xZKDGo2LkJXJS0g8CYaY8TBPQ_Ug-JkFWHm_tWYC3lVTH_3gGCg"/>
            <div class="auth-hero position-absolute top-0 start-0 w-100 h-100" style="backdrop-filter:blur(1px);"></div>
        </div>
        <div class="position-relative text-center" style="z-index:2;">
            <h1 class="font-serif text-white display-3 lh-sm" style="text-shadow:0 4px 20px rgba(0,0,0,.3);">Tinh Hoa Đại Dương,<br/>Giao Tận Bàn Ăn.</h1>
            <hr class="mx-auto mt-4 opacity-25" style="width:80px;border-color:var(--brand-primary);border-width:2px;">
            <p class="text-white-50 mt-4 lead mx-auto" style="max-width:400px;">Trải nghiệm hải sản cao cấp được tuyển chọn khắt khe từ những vùng biển tinh khiết nhất thế giới.</p>
        </div>
        <div class="position-absolute bottom-0 start-0 p-4 d-flex align-items-center gap-3 text-white-50 small text-uppercase" style="letter-spacing:.15em;">
            <strong class="text-white">THE CULINARY CURATOR</strong>
            <span class="border-bottom" style="width:32px;border-color:rgba(255,255,255,.2);"></span>
            <span>Thành lập 2024</span>
        </div>
    </section>

    <!-- Right: Auth Form (40%) -->
    <section class="d-flex align-items-center justify-content-center p-4 p-lg-5 bg-white overflow-auto" style="width:40%;margin-left:60%;">
        <div class="w-100 my-auto pb-4" style="max-width:420px;">
            <!-- Brand -->
            <div class="mb-5 pb-4 border-bottom">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <div class="bg-primary rounded-3 d-flex align-items-center justify-content-center" style="width:40px;height:40px;">
                        <i class="bi bi-tsunami text-white fs-5"></i>
                    </div>
                    <span class="text-brand-secondary fs-5 fw-bold">The Culinary Curator</span>
                </div>
                <h2 class="fw-bold fs-3">Tạo Tài Khoản</h2>
                <p class="text-muted">Vui lòng điền thông tin để đăng ký.</p>
            </div>

            <!-- Error Messages -->
            <div th:if="${error}" class="alert alert-danger small py-2" role="alert">
                <i class="bi bi-exclamation-circle me-1"></i><span th:text="${error}"></span>
            </div>

            <!-- Form -->
            <form th:action="@{/register}" th:object="${dto}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold small text-muted text-uppercase">Tên đăng nhập</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label for="fullName" class="form-label fw-semibold small text-muted text-uppercase">Họ và tên</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold small text-muted text-uppercase">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold small text-muted text-uppercase">Số điện thoại</label>
                    <input type="text" id="phone" th:field="*{phone}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold small text-muted text-uppercase">Mật khẩu</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold small text-muted text-uppercase">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control form-control-lg" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('passwordMatch')}" th:errors="*{passwordMatch}"></div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Đăng Ký</button>
            </form>

            <!-- Login Link -->
            <div class="mt-5 text-center text-muted">
                Đã có tài khoản?
                <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none ms-1">Đăng nhập ngay</a>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
