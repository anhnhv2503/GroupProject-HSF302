<!-- Chatbot Widget Fragment -->
<div th:fragment="widget" id="chatbot-widget" class="position-fixed bottom-0 end-0 m-4" style="z-index:1050;">

    <!-- Chat Panel -->
    <div id="chat-panel" class="d-none flex-column bg-white rounded-4 shadow-lg overflow-hidden mb-3 border" style="width:320px;height:480px;">

        <!-- Header -->
        <div class="bg-primary text-white p-3 d-flex justify-content-between align-items-center position-relative overflow-hidden">
            <div class="d-flex align-items-center gap-2 position-relative" style="z-index:2;">
                <i class="bi bi-robot"></i>
                <strong class="small">Trợ lý Oceanic</strong>
            </div>
            <button id="close-chat" class="btn btn-link text-white p-0 position-relative" style="z-index:2;">
                <i class="bi bi-x-lg"></i>
            </button>
            <div class="position-absolute bg-white opacity-10 rounded-circle" style="width:96px;height:96px;top:-40px;right:-40px;"></div>
        </div>

        <!-- Messages Area -->
        <div id="chat-messages" class="flex-grow-1 p-3 overflow-auto d-flex flex-column gap-2 bg-light small">
            <div class="d-flex flex-column align-items-start">
                <div class="bg-white border text-dark px-3 py-2 rounded-3 shadow-sm" style="max-width:85%;border-radius:1rem 1rem 1rem .25rem !important;">
                    Xin chào! Tôi là trợ lý AI Culinary Curator. Tôi có thể giúp gì cho bạn hôm nay?
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-2 bg-white border-top d-flex align-items-center gap-2">
            <input type="text" id="chat-input" maxlength="300" placeholder="Nhập câu hỏi của bạn..."
                   class="form-control form-control-sm rounded-pill border-0 bg-light" autocomplete="off"/>
            <button id="send-chat" class="btn btn-primary btn-sm rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="width:36px;height:36px;">
                <i class="bi bi-send" style="font-size:.75rem;"></i>
            </button>
        </div>
    </div>

    <!-- Floating Toggle Button -->
    <button id="chat-toggle" class="btn btn-primary rounded-circle shadow-lg d-flex align-items-center justify-content-center float-end" style="width:56px;height:56px;">
        <i class="bi bi-chat-dots fs-4"></i>
    </button>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('chat-toggle');
            const closeBtn = document.getElementById('close-chat');
            const chatPanel = document.getElementById('chat-panel');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-chat');
            const messagesArea = document.getElementById('chat-messages');

            const toggleChat = () => {
                const isHidden = chatPanel.classList.contains('d-none');
                if (isHidden) {
                    chatPanel.classList.remove('d-none');
                    chatPanel.classList.add('d-flex');
                    chatInput.focus();
                } else {
                    chatPanel.classList.add('d-none');
                    chatPanel.classList.remove('d-flex');
                }
            };
            toggleBtn.addEventListener('click', toggleChat);
            closeBtn.addEventListener('click', toggleChat);

            const appendMessage = (text, isUser) => {
                const container = document.createElement('div');
                container.className = `d-flex flex-column ${isUser ? 'align-items-end' : 'align-items-start'}`;
                const bubble = document.createElement('div');
                bubble.className = isUser
                    ? 'bg-primary text-white px-3 py-2 shadow-sm'
                    : 'bg-white border text-dark px-3 py-2 shadow-sm';
                bubble.style.cssText = isUser
                    ? 'max-width:85%;border-radius:1rem 1rem .25rem 1rem;'
                    : 'max-width:85%;border-radius:1rem 1rem 1rem .25rem;';
                bubble.innerHTML = text.replace(/\n/g, '<br>');
                container.appendChild(bubble);
                messagesArea.appendChild(container);
                scrollToBottom();
            };

            const appendLoading = () => {
                const container = document.createElement('div');
                container.id = 'chat-loading';
                container.className = 'd-flex flex-column align-items-start';
                container.innerHTML = '<div class="bg-light text-muted px-3 py-2 rounded-3 d-flex gap-1 align-items-center"><div class="spinner-grow spinner-grow-sm text-muted" style="width:.5rem;height:.5rem;"></div><div class="spinner-grow spinner-grow-sm text-muted" style="width:.5rem;height:.5rem;animation-delay:.15s;"></div><div class="spinner-grow spinner-grow-sm text-muted" style="width:.5rem;height:.5rem;animation-delay:.3s;"></div></div>';
                messagesArea.appendChild(container);
                scrollToBottom();
            };

            const removeLoading = () => { const l = document.getElementById('chat-loading'); if (l) l.remove(); };
            const scrollToBottom = () => { messagesArea.scrollTop = messagesArea.scrollHeight; };

            const sendMessage = async () => {
                const text = chatInput.value.trim();
                if (!text) return;
                appendMessage(text, true);
                chatInput.value = '';
                appendLoading();
                try {
                    const response = await fetch('/chatbot/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: text }) });
                    const data = await response.json();
                    removeLoading();
                    appendMessage(data.reply, false);
                } catch (error) {
                    removeLoading();
                    appendMessage('Xin lỗi, tôi đang bận. Vui lòng thử lại sau.', false);
                }
            };
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        });
    </script>
</div>
