<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<aside th:fragment="sidebar"
    class="h-screen w-72 fixed left-0 top-0 bg-tertiary text-white shadow-2xl flex flex-col py-8 z-50">

    <!-- Brand Header -->
    <a href="/">
        <div class="px-8 mb-12 flex items-center gap-4">
            <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-black/20">
                <span class="material-symbols-outlined text-white text-3xl"
                    style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
            </div>
            <div>
                <h1 class="text-2xl font-headline font-bold tracking-tight text-white leading-tight">The Oceanic</h1>
                <p class="text-[10px] uppercase tracking-[0.2em] text-secondary font-bold">The Culinary Curator</p>
            </div>
        </div>
    </a>


    <!-- Navigation Links -->
    <nav class="flex-1 space-y-1.5 px-4">
        <a th:href="@{/admin/dashboard}"
            th:classappend="${page == 'dashboard'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 rounded-lg transition-all group">
            <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">dashboard</span>
            <span class="text-sm font-semibold">Bảng điều khiển</span>
        </a>
        <a th:href="@{/admin/categories}"
            th:classappend="${page == 'categories'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 rounded-lg transition-all group">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">category</span>
            <span class="text-sm">Quản Lý Danh Mục</span>
        </a>
        <a th:href="@{/admin/seafood-products}"
            th:classappend="${page == 'products'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 rounded-lg transition-all group">
            <span
                class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">inventory_2</span>
            <span class="text-sm font-semibold">Kho Hàng</span>
        </a>
        <a th:href="@{/admin/orders}"
            th:classappend="${page == 'orders'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 transition-all rounded-lg group">
            <span
                class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">shopping_basket</span>
            <span class="text-sm font-semibold">Đơn hàng</span>
        </a>
        <a th:href="@{/admin/users}"
            th:classappend="${page == 'users'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 transition-all rounded-lg group">
            <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">group</span>
            <span class="text-sm font-semibold">Người dùng</span>
        </a>
        <a th:href="@{/admin/coupon}"
            th:classappend="${page == 'coupons'} ? ' bg-primary text-white shadow-md font-bold' : ' text-white/70 hover:text-white hover:bg-white/10'"
            class="flex items-center gap-4 px-4 py-3.5 transition-all rounded-lg group">
            <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">payments</span>
            <span class="text-sm font-semibold">Mã giảm giá</span>
        </a>
        <a class="flex items-center gap-4 text-white/70 hover:text-white px-4 py-3.5 transition-all hover:bg-white/10 rounded-lg group"
            href="#">
            <span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">analytics</span>
            <span class="text-sm font-semibold">Review</span>
        </a>
    </nav>
    <!-- Footer Profile -->
    <div class="mt-auto px-4 space-y-4 pt-6 border-t border-white/10">
       
        <!-- <a class="flex items-center gap-4 text-white/60 hover:text-white px-4 py-2 transition-colors group" href="#">
            <span class="material-symbols-outlined text-xl group-hover:rotate-45 transition-transform">settings</span>
            <span class="text-xs font-medium uppercase tracking-widest">Cài đặt hệ thống</span>
        </a> -->
        <form th:action="@{/logout}" method="post">
            <button class="flex items-center gap-4 text-white/60 hover:text-white px-4 py-2 transition-colors group"
                type="submit">
                <span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform">logout</span>
                <span class="text-xs font-medium uppercase tracking-widest">Đăng xuất</span>
            </button>
        </form>
    </div>
</aside>
