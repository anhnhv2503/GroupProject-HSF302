<header th:fragment="header"
        class="sticky top-0 right-0 w-full h-20 glass-effect flex justify-between items-center px-10 z-40 border-b border-outline-variant/20">
    <div class="flex items-center gap-12">
        <div
                class="flex items-center gap-3 bg-white px-5 py-2.5 rounded-full border border-outline-variant/30 shadow-sm focus-within:ring-2 ring-primary/20 transition-all">

            <input

    <div class="flex items-center gap-6">

                        class="absolute top-2.5 right-2.5 w-2 h-2 bg-primary rounded-full border-2 border-white"></span>
            </button>

                    class="w-11 h-11 flex items-center justify-center rounded-full hover:bg-primary/5 transition-colors text-tertiary">

            </button>
        </div>
        <div class="h-8 w-px bg-outline-variant/30"></div>
        <div class="flex items-center gap-3 pl-2">
            <div class="text-right hidden sm:block">
                <p class="text-sm font-bold text-on-surface">Oceanic Admin</p>
                <p class="text-[10px] text-on-surface-variant font-medium uppercase">Quản trị viên</p>
            </div>
            <button
