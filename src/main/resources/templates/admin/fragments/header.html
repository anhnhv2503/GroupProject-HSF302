<header th:fragment="header" class="bg-white border-bottom sticky-top px-4 py-3 d-flex justify-content-between align-items-center">
    <!-- Search -->
    <div class="d-flex align-items-center gap-3">
        <div class="input-group" style="max-width:320px;">
            <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control bg-light border-0" placeholder="Tìm kiếm danh mục, sản phẩm..."/>
        </div>
    </div>

    <!-- Right Actions -->
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-light btn-sm rounded-circle position-relative" style="width:40px;height:40px;">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle p-1 bg-primary border border-white rounded-circle" style="width:8px;height:8px;"></span>
        </button>
        <button class="btn btn-light btn-sm rounded-circle" style="width:40px;height:40px;">
            <i class="bi bi-envelope"></i>
        </button>
        <div class="vr mx-1"></div>
        <div class="d-flex align-items-center gap-2">
            <div class="text-end d-none d-sm-block">
                <p class="mb-0 fw-bold small">Oceanic Admin</p>
                <p class="mb-0 text-muted" style="font-size:.65rem;text-transform:uppercase;">Quản trị viên</p>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin&background=0D4A7A&color=fff&size=36" alt="Profile" class="rounded-circle" width="36" height="36"/>
        </div>
    </div>
</header>
