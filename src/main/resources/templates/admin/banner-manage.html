<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="vi" th:with="page='banners'">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Oceanic - Quản Lý Banner</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F26522',
                        secondary: '#E8C872',
                        accent: '#F26522',
                        surface: '#FDFBF7',
                        'on-surface': '#1B1C17',
                        'on-surface-variant': '#44483D',
                        'outline-variant': '#C4C8BA',
                        background: '#F4F7F5',
                        tertiary: '#0D4A7A'
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .font-headline {
            font-family: 'Playfair Display', serif;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>

<body class="bg-background text-on-surface flex min-h-screen">
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<main class="flex-1 ml-72 min-h-screen relative">
    <div th:replace="~{admin/fragments/header :: header}"></div>

    <div class="p-10 space-y-8 relative z-[1]">
        <div class="flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-headline font-bold text-tertiary">Quản Lý Banner</h1>
                <p class="text-on-surface-variant mt-2">Chỉnh sửa banner hiển thị tại trang chủ</p>
            </div>
            <button onclick="openAddModal()"
                class="bg-primary text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">
                <span class="material-symbols-outlined">add</span>
                Thêm Banner Mới
            </button>
        </div>

        <!-- Messages -->
        <div th:if="${successMessage}" class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl" th:text="${errorMessage}"></div>

        <!-- Banner Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="banner : ${banners}"
                class="bg-white rounded-2xl overflow-hidden shadow-sm border border-outline-variant/20 hover:shadow-xl transition-all">
                <!-- Banner Image -->
                <div class="relative h-48 overflow-hidden">
                    <img th:src="${banner.imageUrl}" class="w-full h-full object-cover" alt="Banner Image">
                    <!-- Status Badge -->
                    <div class="absolute top-3 left-3">
                        <form th:action="@{/admin/banners/toggle/{id}(id=${banner.id})}" method="post">
                            <button type="submit"
                                class="px-3 py-1 rounded-full text-[10px] font-bold uppercase shadow-md"
                                th:classappend="${banner.active} ? 'bg-green-500 text-white' : 'bg-slate-500 text-white'"
                                th:text="${banner.active} ? 'Active' : 'Hidden'">
                            </button>
                        </form>
                    </div>
                </div>
                <!-- Banner Info + Actions -->
                <div class="p-5">
                    <h3 class="font-bold text-tertiary text-lg truncate" th:text="${banner.title}">Title</h3>
                    <div class="flex items-center gap-2 mt-1 text-xs text-on-surface-variant">
                        <span class="material-symbols-outlined text-sm">link</span>
                        <span class="truncate" th:text="${banner.link}">Link URL</span>
                    </div>
                    <!-- Always-visible action buttons -->
                    <div class="flex items-center gap-2 mt-4 pt-4 border-t border-outline-variant/20">
                        <button
                            th:data-id="${banner.id}"
                            th:data-title="${banner.title}"
                            th:data-subtitle="${banner.subtitle}"
                            th:data-imageurl="${banner.imageUrl}"
                            th:data-link="${banner.link}"
                            th:data-order="${banner.displayOrder}"
                            th:data-active="${banner.active}"
                            onclick="editBannerFromData(this)"
                            class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-tertiary/10 text-tertiary font-semibold text-sm hover:bg-tertiary hover:text-white transition-all">
                            <span class="material-symbols-outlined text-lg">edit</span>
                            Sửa
                        </button>
                        <a th:href="@{/admin/banners/delete/{id}(id=${banner.id})}"
                            onclick="return confirm('Bạn có chắc chắn muốn xóa banner này?')"
                            class="flex-1 flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-red-50 text-red-600 font-semibold text-sm hover:bg-red-600 hover:text-white transition-all">
                            <span class="material-symbols-outlined text-lg">delete</span>
                            Xóa
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(banners)}" class="flex flex-col items-center justify-center py-20 bg-white rounded-3xl border-2 border-dashed border-outline-variant/30">
            <span class="material-symbols-outlined text-6xl text-outline-variant/50 mb-4">view_carousel</span>
            <p class="text-on-surface-variant font-medium">Chưa có banner nào được tạo.</p>
            <button onclick="openAddModal()" class="mt-4 text-primary font-bold hover:underline">Thêm banner đầu tiên</button>
        </div>
    </div>
</main>

<!-- Modal -->
<div id="bannerModal" class="fixed inset-0 bg-black/60 z-[200] flex items-center justify-center hidden backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden">
        <div class="bg-tertiary p-6 text-white flex justify-between items-center">
            <h2 id="modalTitle" class="text-2xl font-headline font-bold">Thêm Banner</h2>
            <button onclick="closeModal()" class="hover:rotate-90 transition-transform">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <form th:action="@{/admin/banners/save}" method="post" class="p-8 space-y-5">
            <input type="hidden" id="bannerId" name="id">
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1.5">Tiêu đề Banner</label>
                <input type="text" id="bannerTitle" name="title" placeholder="Nhập tiêu đề..."
                    class="w-full rounded-xl border-outline-variant/30 focus:ring-primary focus:border-primary px-4 py-3">
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1.5">Phụ đề (Subtitle)</label>
                <input type="text" id="bannerSubtitle" name="subtitle" placeholder="Nhập phụ đề ngắn..."
                    class="w-full rounded-xl border-outline-variant/30 focus:ring-primary focus:border-primary px-4 py-3">
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1.5">Đường dẫn hình ảnh (URL)</label>
                <input type="text" id="bannerImageUrl" name="imageUrl" required placeholder="https://..."
                    class="w-full rounded-xl border-outline-variant/30 focus:ring-primary focus:border-primary px-4 py-3">
            </div>
            <div>
                <label class="block text-sm font-bold text-on-surface-variant mb-1.5">Liên kết khi nhấp vào</label>
                <input type="text" id="bannerLink" name="link" placeholder="/san-pham"
                    class="w-full rounded-xl border-outline-variant/30 focus:ring-primary focus:border-primary px-4 py-3">
            </div>
            <div class="flex gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-bold text-on-surface-variant mb-1.5">Thứ tự hiển thị</label>
                    <input type="number" id="bannerDisplayOrder" name="displayOrder" value="0"
                        class="w-full rounded-xl border-outline-variant/30 focus:ring-primary focus:border-primary px-4 py-3">
                </div>
                <div class="flex items-center gap-2 pt-6">
                    <input type="checkbox" id="bannerActive" name="active" value="true" checked
                        class="w-5 h-5 rounded-lg text-primary focus:ring-primary border-outline-variant/50">
                    <label class="text-sm font-bold text-on-surface-variant">Hiển thị</label>
                </div>
            </div>
            <div class="pt-4 flex gap-4">
                <button type="button" onclick="closeModal()"
                    class="flex-1 px-6 py-3 rounded-xl border border-outline-variant font-bold text-on-surface-variant hover:bg-slate-50 transition-all">Hủy bỏ</button>
                <button type="submit"
                    class="flex-1 px-6 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all">Lưu Banner</button>
            </div>
        </form>
    </div>
</div>

<script>
    function editBannerFromData(btn) {
        document.getElementById('modalTitle').innerText = 'Chỉnh Sửa Banner';
        document.getElementById('bannerId').value = btn.dataset.id;
        document.getElementById('bannerTitle').value = btn.dataset.title || '';
        document.getElementById('bannerSubtitle').value = btn.dataset.subtitle || '';
        document.getElementById('bannerImageUrl').value = btn.dataset.imageurl || '';
        document.getElementById('bannerLink').value = btn.dataset.link || '';
        document.getElementById('bannerDisplayOrder').value = btn.dataset.order || '0';
        document.getElementById('bannerActive').checked = btn.dataset.active === 'true';
        document.getElementById('bannerModal').classList.remove('hidden');
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Thêm Banner';
        document.getElementById('bannerId').value = '';
        document.getElementById('bannerTitle').value = '';
        document.getElementById('bannerSubtitle').value = '';
        document.getElementById('bannerImageUrl').value = '';
        document.getElementById('bannerLink').value = '';
        document.getElementById('bannerDisplayOrder').value = '0';
        document.getElementById('bannerActive').checked = true;
        document.getElementById('bannerModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('bannerModal').classList.add('hidden');
    }
</script>
</body>

</html>
