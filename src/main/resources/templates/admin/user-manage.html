<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>The Oceanic - Quản Lý Người Dùng</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#F26522',
                        tertiary: '#0D4A7A',
                        background: '#F4F7F5',
                        'on-surface': '#1B1C17',
                        'on-surface-variant': '#44483D',
                        'outline-variant': '#C4C8BA'
                    },
                    fontFamily: {
                        headline: ['Playfair Display', 'serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-headline { font-family: 'Playfair Display', serif; }
        .font-numeric { font-family: 'Space Grotesk', sans-serif; font-variant-numeric: tabular-nums; }
        dialog::backdrop { background: rgba(0,0,0,0.5); }
        dialog[open] { animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="bg-background text-on-surface flex min-h-screen">
<div th:replace="~{admin/fragments/sidebar :: sidebar}"></div>

<main class="flex-1 ml-72 min-h-screen relative">
    <div th:replace="~{admin/fragments/header :: header}"></div>

    <div class="p-10 space-y-6">
        <div>
            <h1 class="text-5xl font-headline font-bold text-tertiary tracking-tight">Quản Lý Người Dùng</h1>
            <p class="mt-2 text-on-surface-variant">Theo dõi danh sách người dùng và kiểm soát quyền</p>
        </div>

        <div th:if="${successMessage}" class="rounded-xl border border-green-200 bg-green-50 text-green-700 px-4 py-3 text-sm font-semibold" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="rounded-xl border border-red-200 bg-red-50 text-red-700 px-4 py-3 text-sm font-semibold" th:text="${errorMessage}"></div>

        <form method="get" th:action="@{/admin/users}" class="max-w-xl">
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70 text-lg">search</span>
                <input name="keyword" th:value="${keyword}" type="text" placeholder="Tìm kiếm..." class="w-full rounded-xl border border-outline-variant/40 pl-10 pr-4 py-3 text-sm focus:border-primary focus:ring-primary/20"/>
            </div>
        </form>

        <div class="grid grid-cols-4 gap-4">
            <div class="rounded-xl bg-white border border-outline-variant/20 p-4 shadow-sm">
                <p class="text-sm text-on-surface-variant">Tổng</p>
                <p class="text-4xl font-bold text-tertiary font-numeric mt-2" th:text="${totalUsers}">0</p>
            </div>
            <div class="rounded-xl bg-white border border-outline-variant/20 p-4 shadow-sm">
                <p class="text-sm text-on-surface-variant">Khách hàng</p>
                <p class="text-4xl font-bold text-tertiary font-numeric mt-2" th:text="${customerUsers}">0</p>
            </div>
            <div class="rounded-xl bg-white border border-outline-variant/20 p-4 shadow-sm">
                <p class="text-sm text-on-surface-variant">Hoạt động</p>
                <p class="text-4xl font-bold text-emerald-600 font-numeric mt-2" th:text="${activeUsers}">0</p>
            </div>
            <div class="rounded-xl bg-white border border-outline-variant/20 p-4 shadow-sm">
                <p class="text-sm text-on-surface-variant">Bị khóa</p>
                <p class="text-4xl font-bold text-rose-600 font-numeric mt-2" th:text="${blockedUsers}">0</p>
            </div>
        </div>

        <div class="rounded-2xl bg-white border border-outline-variant/20 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="bg-background/50">
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Người dùng</th>
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Liên hệ</th>
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Vai trò</th>
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Đơn</th>
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70">Chi tiêu</th>
                        <th class="px-4 py-3 text-xs font-bold uppercase tracking-widest text-on-surface-variant/70 text-center">Quyền</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-outline-variant/10">
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6" class="px-4 py-12 text-center text-on-surface-variant">Không có người dùng.</td>
                    </tr>

                    <tr th:each="user : ${users}" class="hover:bg-background/40">
                        <td class="px-4 py-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-tertiary text-white flex items-center justify-center text-sm font-bold"
                                     th:text="${#strings.substring(user.fullName != null ? user.fullName : user.username, 0, 1).toUpperCase()}">A</div>
                                <div>
                                    <p class="font-semibold text-tertiary text-sm" th:text="${user.fullName != null ? user.fullName : user.username}">Admin</p>
                                    <p class="text-xs text-on-surface-variant" th:text="${user.email}">email@test.com</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-4 py-3 text-sm" th:text="${user.phone != null ? user.phone : '-'}">+84 912 000 000</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-0.5 rounded-full text-xs font-bold uppercase"
                                  th:classappend="${user.role == 'ADMIN'} ? ' bg-primary text-white' : ' bg-slate-200 text-slate-700'"
                                  th:text="${user.role}">CUSTOMER</span>
                        </td>
                        <td class="px-4 py-3 text-lg font-bold text-tertiary font-numeric" th:text="${orderCountByUser[user.id] ?: 0}">0</td>
                        <td class="px-4 py-3 text-lg font-bold text-primary font-numeric" th:text="${#numbers.formatDecimal(spendingByUser[user.id] ?: 0, 1, 'COMMA', 0, 'POINT')} + 'đ'">0đ</td>
                        <td class="px-4 py-3 text-center">
                            <button type="button"
                                    th:attr="data-id=${user.id}, data-name=${user.fullName ?: user.username}, data-email=${user.email}, data-enabled=${user.enabled}, data-cart=${user.canAddToCart}, data-review=${!user.isCommentBlocked}"
                                    onclick="openModal(this)"
                                    class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm font-medium bg-tertiary text-white hover:bg-tertiary/90">
                                <span class="material-symbols-outlined text-base">settings</span>
                                <span th:text="${user.enabled && user.canAddToCart && !user.isCommentBlocked} ? 'Đầy đủ' : 'Hạn chế'">Đầy đủ</span>
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<!-- One modal -->
<dialog id="permModal" class="modal p-6 rounded-2xl w-full max-w-md shadow-2xl">
    <form id="permForm" method="post" class="space-y-4">
        <input type="hidden" id="permUserId" name="id" value=""/>

        <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold text-tertiary">Quyền người dùng</h2>
            <button type="button" onclick="closeModal()" class="p-1 hover:bg-slate-100 rounded">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div class="p-3 bg-slate-50 rounded-xl">
            <p class="font-semibold text-tertiary" id="permUserName">-</p>
            <p class="text-sm text-on-surface-variant" id="permUserEmail">-</p>
        </div>

        <hr class="border-slate-200"/>

        <div class="space-y-3">
            <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer">
                <div>
                    <p class="font-medium">Đăng nhập</p>
                    <p class="text-xs text-on-surface-variant">Cho phép đăng nhập hệ thống</p>
                </div>
                <input type="hidden" name="enabled" id="permEnabledVal" value="true"/>
                <input type="checkbox" id="permEnabled" class="w-5 h-5 text-emerald-600 rounded" onchange="document.getElementById('permEnabledVal').value = this.checked"/>
            </label>

            <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer">
                <div>
                    <p class="font-medium">Mua hàng</p>
                    <p class="text-xs text-on-surface-variant">Cho phép thêm giỏ hàng</p>
                </div>
                <input type="hidden" name="canAddToCart" id="permCanAddToCartVal" value="true"/>
                <input type="checkbox" id="permCanAddToCart" class="w-5 h-5 text-emerald-600 rounded" onchange="document.getElementById('permCanAddToCartVal').value = this.checked"/>
            </label>

            <label class="flex items-center justify-between p-3 border rounded-xl cursor-pointer">
                <div>
                    <p class="font-medium">Đánh giá</p>
                    <p class="text-xs text-on-surface-variant">Cho phép viết đánh giá</p>
                </div>
                <input type="hidden" name="canReview" id="permCanReviewVal" value="true"/>
                <input type="checkbox" id="permCanReview" class="w-5 h-5 text-emerald-600 rounded" onchange="document.getElementById('permCanReviewVal').value = this.checked"/>
            </label>
        </div>

        <div class="flex gap-2 pt-2">
            <button type="button" onclick="closeModal()"
                    class="flex-1 px-4 py-2 rounded-xl border border-slate-300 font-medium hover:bg-slate-50">
                Hủy
            </button>
            <button type="submit" class="flex-1 px-4 py-2 rounded-xl bg-primary text-white font-medium hover:bg-primary/90">
                Lưu
            </button>
        </div>
    </form>
</dialog>

<script>
    function openModal(btn) {
        var id = btn.getAttribute('data-id');
        document.getElementById('permUserId').value = id;
        document.getElementById('permUserName').textContent = btn.getAttribute('data-name');
        document.getElementById('permUserEmail').textContent = btn.getAttribute('data-email');

        var enabled = btn.getAttribute('data-enabled') === 'true';
        var cart = btn.getAttribute('data-cart') === 'true';
        var review = btn.getAttribute('data-review') === 'true';

        document.getElementById('permEnabled').checked = enabled;
        document.getElementById('permEnabledVal').value = enabled;
        document.getElementById('permCanAddToCart').checked = cart;
        document.getElementById('permCanAddToCartVal').value = cart;
        document.getElementById('permCanReview').checked = review;
        document.getElementById('permCanReviewVal').value = review;

        document.getElementById('permForm').action = '/admin/users/' + id + '/permissions';
        document.getElementById('permModal').showModal();
    }

    function closeModal() {
        document.getElementById('permModal').close();
    }
</script>
</body>
</html>
