<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Lịch Sử Đơn Hàng')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .orders-page-content})}">
    <div class="orders-page-content">
        <div class="max-w-7xl mx-auto px-8 py-12">
            <div class="mb-12">
                <h1 class="text-4xl font-black text-brand-secondary tracking-tighter uppercase leading-none">Lịch Sử <br/><span class="text-brand-primary">Đơn Hàng</span></h1>
                <p class="text-slate-400 font-medium mt-4">Theo dõi và quản lý các giao dịch của bạn.</p>
            </div>

            <!-- Filters -->
            <form method="get" class="bg-white rounded-[2rem] border border-slate-100 p-8 mb-10 shadow-sm">
                <div class="flex flex-wrap gap-6 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block">Mã đơn hàng</label>
                        <input type="text" name="orderCode" th:value="${orderCode}" placeholder="NHẬP MÃ..." class="w-full px-6 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-brand-primary font-bold text-xs" />
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2 block">Trạng thái</label>
                        <select name="orderStatus" class="px-6 py-3 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-brand-primary font-bold text-xs uppercase">
                            <option value="">Tất cả</option>
                            <option th:each="status : ${orderStatuses}" th:value="${status}" th:text="${status.label}" th:selected="${orderStatus == status}"></option>
                        </select>
                    </div>
                    <button type="submit" class="bg-brand-secondary text-white px-10 py-3.5 rounded-2xl font-black uppercase tracking-widest text-[10px] hover:shadow-xl transition-all">Lọc đơn hàng</button>
                    <a href="/orders" class="px-6 py-3.5 text-slate-400 font-bold uppercase tracking-widest text-[10px] hover:text-brand-primary transition-colors">Xóa lọc</a>
                </div>
            </form>

            <!-- Order List -->
            <div th:if="${#lists.isEmpty(orders)}" class="text-center py-24 bg-white rounded-[3rem] border border-dashed border-slate-200">
                <span class="material-symbols-outlined text-5xl text-slate-200 mb-6">receipt_long</span>
                <p class="text-slate-400 font-bold uppercase tracking-widest text-xs">Bạn chưa có đơn hàng nào</p>
                <a href="/products" class="mt-8 inline-block bg-brand-primary text-white px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-[10px]">Mua sắm ngay</a>
            </div>

            <div class="space-y-6">
                <div th:each="order : ${orders}" class="bg-white rounded-[2.5rem] border border-slate-100 p-8 hover:shadow-2xl transition-all group">
                    <a th:href="@{/orders/{id}(id=${order.id})}" class="block">
                        <div class="flex justify-between items-start mb-6 pb-6 border-b border-slate-50">
                            <div>
                                <div class="flex items-center gap-4 mb-2">
                                    <h3 class="text-xl font-black text-brand-secondary tracking-tighter" th:text="'#' + ${order.orderCode}"></h3>
                                    <span class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest" th:classappend="${order.orderStatus.name() == 'DELIVERED'} ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'" th:text="${order.orderStatus.label}"></span>
                                </div>
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest" th:text="${#temporals.format(order.createdDate, 'dd/MM/yyyy HH:mm')}"></p>
                            </div>
                            <div class="text-right">
                                <span class="text-3xl font-black text-brand-primary tracking-tighter" th:text="${#numbers.formatDecimal(order.finalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-8">
                            <div><p class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Thanh toán</p><p class="font-bold text-slate-900" th:text="${order.paymentMethod}"></p></div>
                            <div><p class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Giao đến</p><p class="font-bold text-slate-900 truncate" th:text="${order.recipientName}"></p></div>
                            <div class="md:col-span-2"><p class="text-[9px] font-black uppercase text-slate-400 tracking-widest mb-1">Địa chỉ</p><p class="font-bold text-slate-900 truncate" th:text="${order.shippingAddress}"></p></div>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
