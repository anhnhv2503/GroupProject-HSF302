<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: head('Chi Tiết Đơn Hàng')}"></head>
<body th:replace="~{layout/main :: layout(~{:: .order-detail-content})}">
    <div class="order-detail-content">
        <div class="max-w-7xl mx-auto px-8 py-12">
            <div class="mb-10 flex items-center justify-between">
                <div>
                    <a href="/orders" class="flex items-center gap-2 text-slate-400 hover:text-brand-primary transition-colors mb-6 group">
                        <span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        <span class="text-[10px] font-black uppercase tracking-widest">Quay lại danh sách</span>
                    </a>
                    <h1 class="text-4xl font-black text-brand-secondary tracking-tighter uppercase leading-none">Chi Tiết <br/><span class="text-brand-primary">Đơn Hàng</span></h1>
                </div>
                <div class="text-right">
                    <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Mã đơn hàng</div>
                    <div class="text-2xl font-black text-brand-secondary" th:text="'#' + ${order.orderCode}"></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
                <!-- Left: Products & History -->
                <div class="lg:col-span-8 space-y-8">
                    <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm">
                        <h2 class="text-sm font-black uppercase tracking-widest text-brand-secondary mb-8 pb-4 border-b border-slate-50">Sản phẩm trong đơn</h2>
                        <div class="space-y-6">
                            <div th:each="item : ${orderItems}" class="flex gap-6 items-center">
                                <div class="w-24 h-24 rounded-2xl bg-slate-50 overflow-hidden flex-shrink-0 border border-slate-100 shadow-sm">
                                    <img th:if="${item.productImageUrl}" th:src="${item.productImageUrl}" class="w-full h-full object-cover" />
                                    <div th:unless="${item.productImageUrl}" class="w-full h-full flex items-center justify-center text-slate-300">
                                        <span class="material-symbols-outlined text-3xl">inventory_2</span>
                                    </div>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-slate-900 text-lg mb-1" th:text="${item.productName ?: item.comboName}"></h3>
                                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">
                                        <span th:text="${item.quantity}">1</span> x <span th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                    </p>
                                    <div th:if="${order.orderStatus.name() == 'DELIVERED' and item.product != null}" class="mt-3">
                                        <a th:href="@{/products/{id}(id=${item.product.id})} + '#reviews'" class="text-[9px] font-black uppercase tracking-widest text-brand-primary hover:underline">Viết đánh giá</a>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="text-xl font-black text-brand-secondary" th:text="${#numbers.formatDecimal(item.quantity * item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm">
                        <h2 class="text-sm font-black uppercase tracking-widest text-brand-secondary mb-8 pb-4 border-b border-slate-50">Lịch sử trạng thái</h2>
                        <div class="space-y-8 pl-4">
                            <div th:each="history : ${statusHistories}" class="relative pl-8 border-l-2 border-slate-100 last:border-0 pb-8 last:pb-0">
                                <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-brand-primary border-4 border-white shadow-sm"></div>
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-bold text-slate-900 uppercase text-xs" th:text="${history.status.label}"></p>
                                        <p class="text-xs text-slate-400 mt-1" th:text="${history.note}"></p>
                                    </div>
                                    <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest" th:text="${#temporals.format(history.changedAt, 'dd/MM/yyyy HH:mm')}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Summaries -->
                <div class="lg:col-span-4 space-y-8">
                    <div class="bg-brand-secondary rounded-[2.5rem] p-8 text-white shadow-xl">
                        <h2 class="text-xs font-black uppercase tracking-widest text-white/40 mb-8">Trạng thái hiện tại</h2>
                        <div class="space-y-6">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-bold uppercase tracking-widest text-white/60">Đơn hàng</span>
                                <span class="px-4 py-1 rounded-full bg-white/10 text-[9px] font-black uppercase tracking-widest" th:text="${order.orderStatus.label}"></span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-bold uppercase tracking-widest text-white/60">Thanh toán</span>
                                <span class="px-4 py-1 rounded-full bg-white/10 text-[9px] font-black uppercase tracking-widest" th:text="${order.paymentStatus.label}"></span>
                            </div>
                            <div class="h-px bg-white/10 my-6"></div>
                            <div>
                                <span class="text-[10px] font-bold uppercase tracking-widest text-white/60 block mb-2">Người nhận</span>
                                <p class="font-bold" th:text="${order.recipientName}"></p>
                                <p class="text-xs text-white/60 mt-1" th:text="${order.recipientPhone}"></p>
                                <p class="text-xs text-white/60 mt-2 italic" th:text="${order.shippingAddress}"></p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[2.5rem] border border-slate-100 p-8 shadow-sm space-y-6">
                        <h2 class="text-sm font-black uppercase tracking-widest text-brand-secondary mb-4">Chi tiết thanh toán</h2>
                        <div class="space-y-4">
                            <div class="flex justify-between text-slate-400 font-bold uppercase text-[9px] tracking-widest">
                                <span>Tiền hàng</span>
                                <span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                            <div class="flex justify-between text-green-500 font-bold uppercase text-[9px] tracking-widest">
                                <span>Giảm giá</span>
                                <span th:text="'-' + ${#numbers.formatDecimal(order.discountAmount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                            <div class="flex justify-between text-slate-400 font-bold uppercase text-[9px] tracking-widest">
                                <span>Phí vận chuyển</span>
                                <span th:text="${#numbers.formatDecimal(order.shippingFee, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                            <div class="h-px bg-slate-50 my-4"></div>
                            <div class="flex justify-between items-end">
                                <span class="font-black text-slate-900 text-sm uppercase tracking-widest">Tổng cộng</span>
                                <span class="text-3xl font-black text-brand-primary tracking-tighter" th:text="${#numbers.formatDecimal(order.finalPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Confirm Action -->
                    <div th:if="${order.orderStatus.name() == 'SHIPPING'}" class="p-2 bg-green-50 rounded-[2.5rem] border border-green-100">
                        <form th:action="@{/orders/{id}/received(id=${order.id})}" method="post">
                            <button type="submit" class="w-full h-16 rounded-[2rem] bg-green-600 text-white font-black uppercase tracking-widest text-[10px] hover:shadow-xl transition-all shadow-lg active:scale-95">Xác nhận đã nhận hàng</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
